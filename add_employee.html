{% extends "base.html" %}

{% block title %}Add Employee - HR Analytics{% endblock %}

{% block page_title %}Add New Employee{% endblock %}

{% block content %}
<div class="card" style="max-width: 900px; margin: 0 auto;">
    <div class="card-header">
        <h2 class="card-title">
            <i class="fas fa-user-plus"></i>
            Employee Information
        </h2>
        <a href="{{ url_for('employees') }}" class="btn btn-secondary btn-sm">
            <i class="fas fa-arrow-left"></i>
            Back to List
        </a>
    </div>
    
    <form method="POST" action="{{ url_for('add_employee') }}" onsubmit="return validateEmployeeForm()">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <!-- Personal Information -->
            <div class="form-group">
                <label class="form-label" for="name">Full Name *</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="age">Age *</label>
                <input type="number" class="form-control" id="age" name="age" min="18" max="100" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="gender">Gender *</label>
                <select class="form-control" id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <!-- Job Information -->
            <div class="form-group">
                <label class="form-label" for="department">Department *</label>
                <select class="form-control" id="department" name="department" required>
                    <option value="">Select Department</option>
                    <option value="Sales">Sales</option>
                    <option value="Engineering">Engineering</option>
                    <option value="HR">HR</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Finance">Finance</option>
                    <option value="Operations">Operations</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="job_role">Job Role *</label>
                <input type="text" class="form-control" id="job_role" name="job_role" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="salary">Annual Salary ($) *</label>
                <input type="number" class="form-control" id="salary" name="salary" min="0" step="1000" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="years_at_company">Years at Company *</label>
                <input type="number" class="form-control" id="years_at_company" name="years_at_company" min="0" max="50" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="promotion_history">Number of Promotions</label>
                <input type="number" class="form-control" id="promotion_history" name="promotion_history" min="0" value="0" required>
            </div>
            
            <!-- Performance Metrics -->
            <div class="form-group">
                <label class="form-label" for="job_satisfaction">Job Satisfaction (1-5) *</label>
                <select class="form-control" id="job_satisfaction" name="job_satisfaction" required>
                    <option value="">Select Level</option>
                    <option value="1">1 - Very Dissatisfied</option>
                    <option value="2">2 - Dissatisfied</option>
                    <option value="3">3 - Neutral</option>
                    <option value="4">4 - Satisfied</option>
                    <option value="5">5 - Very Satisfied</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="work_life_balance">Work-Life Balance (1-5) *</label>
                <select class="form-control" id="work_life_balance" name="work_life_balance" required>
                    <option value="">Select Level</option>
                    <option value="1">1 - Very Poor</option>
                    <option value="2">2 - Poor</option>
                    <option value="3">3 - Average</option>
                    <option value="4">4 - Good</option>
                    <option value="5">5 - Excellent</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="performance_rating">Performance Rating *</label>
                <select class="form-control" id="performance_rating" name="performance_rating" required>
                    <option value="">Select Rating</option>
                    <option value="1">1 - Low</option>
                    <option value="2">2 - Medium</option>
                    <option value="3">3 - High</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="overtime">Overtime Work *</label>
                <select class="form-control" id="overtime" name="overtime" required>
                    <option value="">Select Option</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>
            </div>
        </div>
        
        <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1);">
            <a href="{{ url_for('employees') }}" class="btn btn-secondary">
                <i class="fas fa-times"></i>
                Cancel
            </a>
            <button type="submit" class="btn btn-success">
                <i class="fas fa-save"></i>
                Save Employee
            </button>
        </div>
    </form>
</div>
{% endblock %}
