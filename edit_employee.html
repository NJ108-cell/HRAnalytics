{% extends "base.html" %}

{% block title %}Edit Employee - HR Analytics{% endblock %}

{% block page_title %}Edit Employee{% endblock %}

{% block content %}
<div class="card" style="max-width: 900px; margin: 0 auto;">
    <div class="card-header">
        <h2 class="card-title">
            <i class="fas fa-user-edit"></i>
            Edit: {{ employee.name }}
        </h2>
        <a href="{{ url_for('employees') }}" class="btn btn-secondary btn-sm">
            <i class="fas fa-arrow-left"></i>
            Back to List
        </a>
    </div>
    
    <form method="POST" action="{{ url_for('edit_employee', id=employee.id) }}" onsubmit="return validateEmployeeForm()">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <!-- Personal Information -->
            <div class="form-group">
                <label class="form-label" for="name">Full Name *</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ employee.name }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="age">Age *</label>
                <input type="number" class="form-control" id="age" name="age" min="18" max="100" value="{{ employee.age }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="gender">Gender *</label>
                <select class="form-control" id="gender" name="gender" required>
                    <option value="Male" {% if employee.gender == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if employee.gender == 'Female' %}selected{% endif %}>Female</option>
                    <option value="Other" {% if employee.gender == 'Other' %}selected{% endif %}>Other</option>
                </select>
            </div>
            
            <!-- Job Information -->
            <div class="form-group">
                <label class="form-label" for="department">Department *</label>
                <select class="form-control" id="department" name="department" required>
                    <option value="Sales" {% if employee.department == 'Sales' %}selected{% endif %}>Sales</option>
                    <option value="Engineering" {% if employee.department == 'Engineering' %}selected{% endif %}>Engineering</option>
                    <option value="HR" {% if employee.department == 'HR' %}selected{% endif %}>HR</option>
                    <option value="Marketing" {% if employee.department == 'Marketing' %}selected{% endif %}>Marketing</option>
                    <option value="Finance" {% if employee.department == 'Finance' %}selected{% endif %}>Finance</option>
                    <option value="Operations" {% if employee.department == 'Operations' %}selected{% endif %}>Operations</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="job_role">Job Role *</label>
                <input type="text" class="form-control" id="job_role" name="job_role" value="{{ employee.job_role }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="salary">Annual Salary ($) *</label>
                <input type="number" class="form-control" id="salary" name="salary" min="0" step="1000" value="{{ employee.salary }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="years_at_company">Years at Company *</label>
                <input type="number" class="form-control" id="years_at_company" name="years_at_company" min="0" max="50" value="{{ employee.years_at_company }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="promotion_history">Number of Promotions</label>
                <input type="number" class="form-control" id="promotion_history" name="promotion_history" min="0" value="{{ employee.promotion_history }}" required>
            </div>
            
            <!-- Performance Metrics -->
            <div class="form-group">
                <label class="form-label" for="job_satisfaction">Job Satisfaction (1-5) *</label>
                <select class="form-control" id="job_satisfaction" name="job_satisfaction" required>
                    <option value="1" {% if employee.job_satisfaction == 1 %}selected{% endif %}>1 - Very Dissatisfied</option>
                    <option value="2" {% if employee.job_satisfaction == 2 %}selected{% endif %}>2 - Dissatisfied</option>
                    <option value="3" {% if employee.job_satisfaction == 3 %}selected{% endif %}>3 - Neutral</option>
                    <option value="4" {% if employee.job_satisfaction == 4 %}selected{% endif %}>4 - Satisfied</option>
                    <option value="5" {% if employee.job_satisfaction == 5 %}selected{% endif %}>5 - Very Satisfied</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="work_life_balance">Work-Life Balance (1-5) *</label>
                <select class="form-control" id="work_life_balance" name="work_life_balance" required>
                    <option value="1" {% if employee.work_life_balance == 1 %}selected{% endif %}>1 - Very Poor</option>
                    <option value="2" {% if employee.work_life_balance == 2 %}selected{% endif %}>2 - Poor</option>
                    <option value="3" {% if employee.work_life_balance == 3 %}selected{% endif %}>3 - Average</option>
                    <option value="4" {% if employee.work_life_balance == 4 %}selected{% endif %}>4 - Good</option>
                    <option value="5" {% if employee.work_life_balance == 5 %}selected{% endif %}>5 - Excellent</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="performance_rating">Performance Rating *</label>
                <select class="form-control" id="performance_rating" name="performance_rating" required>
                    <option value="1" {% if employee.performance_rating == 1 %}selected{% endif %}>1 - Low</option>
                    <option value="2" {% if employee.performance_rating == 2 %}selected{% endif %}>2 - Medium</option>
                    <option value="3" {% if employee.performance_rating == 3 %}selected{% endif %}>3 - High</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="overtime">Overtime Work *</label>
                <select class="form-control" id="overtime" name="overtime" required>
                    <option value="Yes" {% if employee.overtime == 'Yes' %}selected{% endif %}>Yes</option>
                    <option value="No" {% if employee.overtime == 'No' %}selected{% endif %}>No</option>
                </select>
            </div>
        </div>
        
        <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1);">
            <a href="{{ url_for('employees') }}" class="btn btn-secondary">
                <i class="fas fa-times"></i>
                Cancel
            </a>
            <button type="submit" class="btn btn-success">
                <i class="fas fa-save"></i>
                Update Employee
            </button>
        </div>
    </form>
</div>
{% endblock %}
